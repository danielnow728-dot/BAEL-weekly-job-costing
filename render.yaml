services:
  - type: web
    name: bael-job-costing
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RENDER_DISK_PATH
        value: /var/data
    disk:
      name: reports-data
      mountPath: /var/data
      sizeGB: 1
